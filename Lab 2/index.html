<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Att göra-lista</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>

  <header>
    <h1>Att göra-lista</h1>
  </header>

  <main>
    <section class="form-section">
      <form id="todo-form">
        <div class="input">
          <h2>Ny uppgift</h2>
          <label for="task">Vad behöver göras?</label>
          <input type="text" id="task" placeholder="T.ex. Diska, Köp tvättmedel" name="task" required>
        </div>

        <div class="input">
          <label for="priority">Prioritet</label>
          <select id="priority">
            <option value="Hög" class="high">Hög</option>
            <option value="Medel" class="medium">Medel</option>
            <option value="Låg" class="low">Låg</option>
          </select>
        </div>

        <button type="submit" id="add-btn">Lägg till</button>
      </form>
      <p id="error-message" class="error-text" style="display: none;"></p>
    </section>

    <section class="list-section">
      <h2>Att göra:</h2>
      <div id="todo-list">
        <p class="empty-message">Listan är tom... än så länge!</p>
        <!-- Lista med uppgifter kommer att läggas till här -->
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
